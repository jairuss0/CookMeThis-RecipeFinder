<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookMeThis: Find your next recipe.</title>
    <script src="https://kit.fontawesome.com/fbe184ea4b.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles/navigation.css">
    <link rel="stylesheet" href="../styles/recipepageStyle.css">

</head>

<body>

    <!---NAVIGATION-->
    <nav>
        <div class="nav-container">
            <div class="nav-container">
                <div class="nav-logo"><h5 id="logo"><em>CookMeThis</em></h5></div>
                <div class="nav-link">
                    <a href="/recipePage.html" target="_self">Home</a>
                    <a href="/favourites.html" target="_self">Your favourites <span id="favourites-count">(0)</span></a>
                </div>
            </div>
        </div>
    </nav>
    <!-----RESULT SECTION-->
    <section class="main-section">
        <div class="main-container container">
            <!---results-->
            
            <div class="error-container">
                <h2>Page not found! </h2>
                <div>
                    <a href="/recipePage.html" target="_self">Go Back to Search Page</a>
                </div>

            </div>
            <div class="recipe-container">
                <!---LOADING ANIMATION-->
                <div class="loader">
                    <div class="panWrapper">
                        <div class="pan">
                            <div class="food"></div>
                            <div class="panBase"></div>
                            <div class="panHandle"></div>
                        </div>
                        <div class="panShadow"></div>
                    </div>
                    <p class="text-result">Loading Recipe...</p>
                </div>
                <!---RECIPE MEAL RESULT-->
                <div class="hero-recipe-section row ">
                    <div class="meal-img-container col-lg-6">
                        <img src="" class="meal-img" alt="">
                    </div>
                    <div class="meal-description col-lg-6">
                        <p class="meal-category"></p>
                        <p class="meal-name"> </p>
                        <p class="meal-area"></p>
                        <div class="buttons" >
                            <button class="add-fav-btn"><i class="fa-solid fa-plus"></i> Add to favourites</button>
                            <a href="" class="yt-link" target="_blank"><i class="fa-brands fa-youtube"></i> Watch Video
                                Tutorial </a>
                            <a href="/recipePage.html" class="yt-link" target="_self"><i class="fa-solid fa-house"></i> Go Home </a>
                        </div>
                    </div>
                </div>
                <div class="content-section">
                    <div class="instruction-container ">
                        <div class="div">
                            <h6 class="instructions"><i class="fa-solid fa-utensils"></i> Instructions</h6>
                        </div>
                        <div class="instructions-list">

                        </div>
                    </div>
                    <div class="meal-ingredient-container ">
                        <div class="ingredients-div">
                            <div class="div">
                                <h6 class="ingredients"><i class="fa-solid fa-bowl-food"></i> Ingredients</h6>
                            </div>

                            <ul class="ingredients-list">

                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!----FOOTER-->


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
    <script src="./js/recipeItem.js"></script>
</body>

</html>
