<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookMeThis: Find your next recipe.</title>
    <script src="https://kit.fontawesome.com/fbe184ea4b.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles/recipepageStyle.css">
    
</head>

<body>
    <!---NAVIGATION-->
    <nav>
        <div class="nav-container">
            <div class="nav-logo"><h5 id="logo"><em>CookMeThis</em></h5></div>
            <div class="nav-link">
                <a href="/recipePage.html" target="_self">Home</a>
                <a href="/favourites.html" target="_self">Your favourites <span id="favourites-count">(0)</span></a>
            </div>
            
        </div>
    </nav>
    <!---SEARCH AREA-->
    <section class="search-section">
        <div class="search-container container-md">
            <div class="search-box" id="recipe">
                <div class="title">
                    <h3>Look to Get Cooking!</h3>
                    <p>To search for meals and snacks that suit your tastes, use the filters.</p>
                </div>
                <div class="finderInput">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" autocomplete="off" placeholder="Search Ingredients" id="recipeInput">
                </div>
                <div class="search-history"></div>
            </div>
        </div>

    </section>
    <!-----FILTER AND RESULT AREA-->
    <section class="main-section">
        <div class="main-container container-md ">
            <div class="row">
                <!----Filters-->
                <div class="filter-container col-md-4">
                    <!----Filter collpse-->
                    <button class="filter-btn" id="filter-btn" type="button" data-bs-toggle="collapse"
                        data-bs-target="#filterCollapse">
                        FILTER <i class="fa-solid fa-list"></i>
                    </button>

                    <div class="filter-box collapse show" id="filterCollapse">
                        <div>
                            <p class="filter-title">Meal</p>
                        </div>

                        <div class="meal-div" id="meal">

                        </div>
                        <div>
                            <p class="filter-title">Area</p>
                        </div>

                        <div class=" area-div" id="area">

                        </div>
                    </div>

                </div>
                <!---results-->
                <div class="result-container col">
                    <div class="title-recipes">
                        <h3>Recipes <i class="fa-solid fa-utensils"></i></h3>
                    </div>
                    <!---RECIPE RESULT-->
                    <div class="recipes">
                        <div class="row g-2 recipes-result">
                            <div class="loader">
                                <div class="panWrapper">
                                    <div class="pan">
                                        <div class="food"></div>
                                        <div class="panBase"></div>
                                        <div class="panHandle"></div>
                                    </div>
                                    <div class="panShadow"></div>
                                </div>
                                <p class="text-result">"There is nothing to display. Please search something!"</p>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>

    </section>
    <!----FOOTER-->


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
    <script src="/js/findRecipe.js"></script>

</body>

</html>
