<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookMeThis: Find your next recipe.</title>
    <script src="https://kit.fontawesome.com/fbe184ea4b.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles/navigation.css">
    <link rel="stylesheet" href="../styles/recipepageStyle.css">
    <script src="/js/findRecipe.js"></script>
</head>

<body>
    <!---NAVIGATION-->
    <nav>

    </nav>
    <!---SEARCH AREA-->
    <section class="search-container container-md mt-5 p-4 shadow">
        <div class="search-box">
            <div class="title">
                <h3>Search Meal</h3>
                <p>To search for meals and snacks that suit your tastes, use the filters.</p>
            </div>
            <div class="finderInput">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" autocomplete="off" placeholder="Example: egg">
            </div>
            <div class="search-history"></div>
        </div>
    </section>
    <!-----FILTER AND RESULT AREA-->
    <section class="main-container container-md mt-5">
        <div class="row">
            <!----Filters-->
            <div class="col-md-3 filter-container position-sticky">
                <div class="filter-box">
                    
                </div>
            </div>
            <!---results-->
            <div class="col-md-9 result-container">

            </div>
        </div>
    </section>
    <!----FOOTER-->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
</body>

</html>
